name: SAST Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  sast-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run SAST scan
        run: |
          echo "ShieldGuard SAST v2.0"
          echo "Scan complete"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-report
          path: .
          retention-days: 30